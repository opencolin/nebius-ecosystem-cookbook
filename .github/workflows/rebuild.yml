name: Rebuild cookbook
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # weekly, Mondays 06:00 UTC
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install nbconvert markdown pygments
      - run: |
          rm -rf .cache/cookbook-src
          git clone --depth 1 https://github.com/nebius/token-factory-cookbook .cache/cookbook-src
          python build_cookbook.py
          touch .nojekyll
      - name: Commit rebuilt cookbook
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A cookbook .nojekyll
          git commit -m "chore: rebuild cookbook from upstream" || echo "no changes"
          git push
